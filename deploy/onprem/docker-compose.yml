services:
  nginx:
    image: nginx:alpine
    ports: ["80:80"]
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [hub-web]
    restart: unless-stopped

  hub-web:
    image: ghcr.io/OWNER/REPO/hub:latest   # 릴리스 시 실제 태그로 교체
    env_file: .env
    expose: ["3000"]
    depends_on: [hub-api]
    restart: unless-stopped

  hub-api:                  # TODO: 실제 백엔드 이미지로 교체
    image: hashicorp/http-echo
    command: ["-text=hub-api placeholder", "-listen=:8080"]
    expose: ["8080"]
    restart: unless-stopped

  db:                       # TODO: 실제 DB 설정으로 교체
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-hubdb}
    volumes: ["hub-data:/var/lib/postgresql/data"]
    restart: unless-stopped

volumes:
  hub-data:
